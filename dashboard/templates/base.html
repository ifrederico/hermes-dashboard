<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %} — Hermes</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h1>☤ Hermes</h1>
        <small>Dashboard</small>
      </div>
      <nav>
        <a href="/" {% if page == 'index' %}class="active"{% endif %}>Overview</a>
        <a href="/sessions" {% if page == 'sessions' %}class="active"{% endif %}>Sessions</a>
        <a href="/memory" {% if page == 'memory' %}class="active"{% endif %}>Memory</a>
        <a href="/skills" {% if page == 'skills' %}class="active"{% endif %}>Skills</a>
        <a href="/cron" {% if page == 'cron' %}class="active"{% endif %}>Cron Jobs</a>
        <a href="/config" {% if page == 'config' %}class="active"{% endif %}>Config</a>
      </nav>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
